<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f6feb"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- メンバーが集まる軌道（うっすら） -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#ffffff" stroke-opacity="0.22"
          stroke-width="4" stroke-dasharray="3 16" stroke-linecap="round"/>

  <!-- 集まってくる4人（メンバー色） -->
  <g stroke="#ffffff" stroke-width="6">
    <circle cx="256" cy="106" r="30" fill="#8b5cf6"/>
    <circle cx="406" cy="256" r="30" fill="#2fbf71"/>
    <circle cx="256" cy="406" r="30" fill="#f5a623"/>
    <circle cx="106" cy="256" r="30" fill="#e5484d"/>
  </g>

  <!-- 中央：待ち合わせピン（集合地点） -->
  <g filter="url(#sh)">
    <path transform="translate(194 148) scale(1.07)"
          d="M58 0C26 0 0 26 0 58c0 42 58 96 58 96s58-54 58-96C116 26 90 0 58 0z"
          fill="#ffffff"/>
    <circle cx="256" cy="210" r="25" fill="url(#bg)"/>
  </g>
</svg>
